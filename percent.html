<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>퍼센트 계산기 — 할인율·인상률·비율 계산</title>
<meta name="description" content="전체의 몇 %는 얼마인지, 어떤 값이 전체의 몇 %인지, 값이 몇 % 오르거나 내렸는지, 할인가까지. 퍼센트 계산 4가지를 한 페이지에서.">
<link rel="canonical" href="https://modutools.vercel.app/percent.html">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/style.css">
<script src="/ads.js" defer></script>
</head>
<body>
<header><a class="logo" href="/">모두<span>도구</span></a><nav><a href="/salary.html">연봉계산</a><a href="/char-count.html">글자수</a><a href="/dday.html">디데이</a></nav></header>
<main>
<h1>퍼센트 계산기</h1>
<p class="lead">가장 많이 쓰는 퍼센트 계산 4가지. 입력하면 바로 계산됩니다.</p>
<div class="card"><b>1. 전체의 몇 %는 얼마?</b>
<div class="row"><div><label>전체 값</label><input type="number" id="a1"></div><div><label>퍼센트 (%)</label><input type="number" id="a2"></div></div>
<div class="result" id="ra">—</div></div>
<div class="card"><b>2. 이 값은 전체의 몇 %?</b>
<div class="row"><div><label>부분 값</label><input type="number" id="b1"></div><div><label>전체 값</label><input type="number" id="b2"></div></div>
<div class="result" id="rb">—</div></div>
<div class="card"><b>3. 얼마나 오르거나 내렸나? (변화율)</b>
<div class="row"><div><label>이전 값</label><input type="number" id="c1"></div><div><label>이후 값</label><input type="number" id="c2"></div></div>
<div class="result" id="rc">—</div></div>
<div class="card"><b>4. 할인가 계산</b>
<div class="row"><div><label>정가</label><input type="number" id="e1"></div><div><label>할인율 (%)</label><input type="number" id="e2"></div></div>
<div class="result" id="re">—</div></div>
<div class="faq">
<h2>변화율 계산은 어떻게 하나요</h2>
<p>(이후 값 − 이전 값) ÷ 이전 값 × 100 입니다. 예를 들어 월세가 50만원에서 55만원이 됐다면 (55−50)÷50×100 = 10% 인상입니다. 내렸다면 음수로 표시됩니다.</p>
</div>
</main>
<div class="ad-slot"></div>
<footer><div class="links"><a href="/">전체 도구</a><a href="/salary.html">연봉 실수령액</a><a href="/bmi.html">BMI</a></div><p>ⓒ 모두도구</p></footer>
<script>
function n(id){return parseFloat(document.getElementById(id).value)}
function f(x){return isFinite(x)?(Math.round(x*100)/100).toLocaleString():'—'}
function upd(){
var A=document.getElementById('ra'),B=document.getElementById('rb'),C=document.getElementById('rc'),E=document.getElementById('re');
A.innerHTML=(!isNaN(n('a1'))&&!isNaN(n('a2')))?n('a1')+'의 '+n('a2')+'% = <strong>'+f(n('a1')*n('a2')/100)+'</strong>':'—';
B.innerHTML=(!isNaN(n('b1'))&&!isNaN(n('b2'))&&n('b2')!==0)?n('b1')+'은(는) '+n('b2')+'의 <strong>'+f(n('b1')/n('b2')*100)+'%</strong>':'—';
if(!isNaN(n('c1'))&&!isNaN(n('c2'))&&n('c1')!==0){var ch=(n('c2')-n('c1'))/n('c1')*100;C.innerHTML='<strong>'+f(ch)+'%</strong> '+(ch>=0?'증가':'감소')}else C.innerHTML='—';
E.innerHTML=(!isNaN(n('e1'))&&!isNaN(n('e2')))?'할인가 <strong>'+f(n('e1')*(1-n('e2')/100))+'</strong> ('+f(n('e1')*n('e2')/100)+' 할인)':'—';
}
document.querySelectorAll('input').forEach(function(i){i.addEventListener('input',upd)});
</script>
</body>
</html>
